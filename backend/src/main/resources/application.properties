spring.application.name=sausage-store
management.security.enabled=false

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Секреты (spring.datasource.username/password/url, spring.data.mongodb.uri)
# приходят из Vault. Конфиг Vault задаётся через переменные окружения
# в backend deployment (SPRING_CONFIG_IMPORT, SPRING_CLOUD_VAULT_*).
# В тестах Vault выключен (см. src/test/resources/application.properties).

# протокол, по которому доступно API Vault, в проде лучше сделать https
#spring.cloud.vault.scheme=http
#spring.cloud.vault.kv.enabled=true

# Enable Flyway
spring.flyway.enabled=true
flyway.baselineOnMigrate=true

#H2 settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
management.endpoint.prometheus.enabled=true
management.endpoints.web.exposure.include=health,prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true
