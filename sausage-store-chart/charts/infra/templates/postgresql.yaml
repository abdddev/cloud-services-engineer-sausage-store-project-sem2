apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app: postgresql
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        # Достаёт логин/пароль/имя БД из Vault и кладёт в файлы,
        # которые postgres читает через POSTGRES_*_FILE.
        - command:
            - sh
            - -c
            - |
              set -e
              vault status
              vault kv get -mount=kv -field=spring.datasource.username sausage-store > {{ .Values.global.secrets }}/postgres-username
              vault kv get -mount=kv -field=spring.datasource.password sausage-store > {{ .Values.global.secrets }}/postgres-password
              vault kv get -mount=kv -field=postgresql.init.database  sausage-store > {{ .Values.global.secrets }}/postgres-database
          {{- include "vault.init.container" . | nindent 10 }}
      containers:
        - name: postgresql
          image: postgres:15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.postgresql.containerPort }}
              protocol: TCP
          env:
            - name: POSTGRES_USER_FILE
              value: {{ .Values.global.secrets }}/postgres-username
            - name: POSTGRES_PASSWORD_FILE
              value: {{ .Values.global.secrets }}/postgres-password
            - name: POSTGRES_DB_FILE
              value: {{ .Values.global.secrets }}/postgres-database
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -h 127.0.0.1 -p {{ .Values.postgresql.containerPort }}"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -h 127.0.0.1 -p {{ .Values.postgresql.containerPort }}"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            successThreshold: 1
          resources:
            requests:
              memory: {{ .Values.postgresql.resources.requests.memory }}
              cpu: {{ .Values.postgresql.resources.requests.cpu }}
            limits:
              memory: {{ .Values.postgresql.resources.limits.memory }}
              cpu: {{ .Values.postgresql.resources.limits.cpu }}
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
            - name: {{ .Values.global.vault.volume }}
              mountPath: {{ .Values.global.secrets }}
              readOnly: true
      volumes:
        - name: {{ .Values.global.vault.volume }}
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app: postgresql
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.postgresql.containerPort }}
      targetPort: {{ .Values.postgresql.containerPort }}
      protocol: TCP
      name: client
  selector:
    app: postgresql
