apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      initContainers:
        # Достаёт root-логин/пароль Mongo из Vault и кладёт в файлы,
        # которые mongo читает через MONGO_INITDB_ROOT_*_FILE.
        - command:
            - sh
            - -c
            - |
              set -e
              vault status
              vault kv get -mount=kv -field=mongodb.init.username sausage-store > {{ .Values.global.secrets }}/mongo-root-username
              vault kv get -mount=kv -field=mongodb.init.password sausage-store > {{ .Values.global.secrets }}/mongo-root-password
          {{- include "vault.init.container" . | nindent 10 }}
      containers:
      - name: mongodb
        image: mongo:7.0
        env:
          - name: MONGO_INITDB_ROOT_USERNAME_FILE
            value: "{{ .Values.global.secrets }}/mongo-root-username"
          - name: MONGO_INITDB_ROOT_PASSWORD_FILE
            value: "{{ .Values.global.secrets }}/mongo-root-password"
        ports:
        - containerPort: {{ .Values.mongodb.containerPort }}
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        - name: {{ .Values.global.vault.volume }}
          mountPath: {{ .Values.global.secrets }}
          readOnly: true
      volumes:
        - name: {{ .Values.global.vault.volume }}
          emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  ports:
  - port: {{ .Values.mongodb.containerPort }}
    targetPort: {{ .Values.mongodb.containerPort }}
  selector:
    app: mongodb
  clusterIP: None
