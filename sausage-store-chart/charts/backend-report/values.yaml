global:
  imagePullPolicy: Always

replicas: 1
revisionHistoryLimit: 15
image: abludenov/sausage-backend-report:latest
containerPort: 8080
service:
  port: 8080
mongodbUri: "mongodb://root:rootpassword@mongodb:27017/reports?authSource=admin"
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "500m"
hpa:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
