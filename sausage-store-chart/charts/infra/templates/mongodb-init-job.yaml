apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-mongodb-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mongodb-init
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    helm.sh/hook: "post-install"
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb-init
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-init
          image: mongo:7.0
          command:
            - mongosh
            - "--host"
            - "mongodb"
            - "--port"
            - "27017"
            - "--username"
            - {{ .Values.mongodb.env.MONGO_INITDB_ROOT_USERNAME | quote }}
            - "--password"
            - {{ .Values.mongodb.env.MONGO_INITDB_ROOT_PASSWORD | quote }}
            - "--authenticationDatabase"
            - "admin"
            - "--eval"
            - |
              db = db.getSiblingDB('reports');
              db.createUser({
                user: 'reporter',
                pwd: 'reporterpassword',
                roles: [{ role: 'readWrite', db: 'reports' }]
              });
              print('MongoDB init done');
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
