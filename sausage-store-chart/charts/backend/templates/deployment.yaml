---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: {{ .Chart.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  replicas: {{ .Values.replicas }}
  strategy:
{{ toYaml .Values.strategy | indent 4 }} 
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Chart.Name }}
  template:
    metadata:
      annotations:
        prometheus.io/path: {{ .Values.annotations.path }}
        prometheus.io/port: "{{ .Values.annotations.port }}"
        prometheus.io/scrape: "{{ .Values.annotations.scrape }}"
      labels:
        app: {{ .Release.Name }}-{{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            # Конфиг приходит из Vault через spring-cloud-vault:
            # spring.datasource.url/username/password, spring.data.mongodb.uri
            - name: SPRING_CONFIG_IMPORT
              value: {{ .Values.global.vault.spring.import | quote }}
            - name: SPRING_CLOUD_VAULT_KV_ENABLED
              value: "true"
            - name: SPRING_CLOUD_VAULT_URI
              value: {{ .Values.global.vault.addr | quote }}
            - name: SPRING_CLOUD_VAULT_AUTHENTICATION
              value: "TOKEN"
            - name: SPRING_CLOUD_VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-{{ .Chart.Name }}-vault-token
                  key: token
            - name: REPORT_PATH
              value: {{ .Values.env.reportPath | quote }}
            - name: LOG_PATH
              value: {{ .Values.env.logPath | quote }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          ports:
            - name: {{ .Chart.Name }}
              containerPort: {{ .Values.containerPort }}
          readinessProbe:
{{ toYaml .Values.readinessProbe | indent 12 }}
          livenessProbe:
{{ toYaml .Values.livenessProbe | indent 12 }}
          volumeMounts:
            - name: {{ .Release.Name }}-{{ .Chart.Name }}-reports
              mountPath: {{ .Values.env.reportPath }}
      volumes:
        - name: {{ .Release.Name }}-{{ .Chart.Name }}-reports
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-vpa
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: {{ .Release.Name }}-{{ .Chart.Name }}
  updatePolicy:
{{ toYaml .Values.vpa.updatePolicy | indent 4 }} 
  resourcePolicy:
{{ toYaml .Values.vpa.resourcePolicy | indent 4 }} 